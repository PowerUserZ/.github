name: Claude PR Review (reusable)

on:
  workflow_call:
    inputs:
      prompt:
        type: string
        required: false
        default: |
          Review this pull request for correctness, security, and code quality.
          Post findings as a single review comment with severity tags
          (critical / high / medium / low / nit). Be specific: quote lines,
          give fixes. Call out silent failures, data-loss paths, and any
          injection/quoting issues explicitly.
      claude_args:
        type: string
        required: false
        default: "--max-turns 6"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ inputs.prompt }}
          claude_args: ${{ inputs.claude_args }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
